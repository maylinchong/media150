<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ending — Curious</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    color: white;
    font-family: Helvetica, sans-serif;
  }

  .bg {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; filter: brightness(30%); z-index: -1;
  }

  h1 {
    position: absolute; top: 40px; left: 50%;
    transform: translateX(-50%);
    font-weight: 200; letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0; animation: fade 1.5s forwards;
  }

  .story {
    position: absolute; top: 120px; left: 50%;
    transform: translateX(-50%);
    max-width: 520px; text-align: center;
    font-size: 1rem; line-height: 1.5rem;
  }

  .line { opacity: 0; animation: fade 1.5s forwards; }
  .delay1 { animation-delay: 0.5s; }
  .delay2 { animation-delay: 1.5s; }
  .delay3 { animation-delay: 2.5s; }
  .delay4 { animation-delay: 3.5s; }

  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

  .end {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(-50%);
    opacity: 0; animation: fade 2s forwards;
    animation-delay: 4.5s;
    letter-spacing: 3px; text-transform: uppercase;
    font-size: 0.8rem; opacity: 0.8;
    text-align: center;
  }

  .btn {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 20px;
    border: 1px solid white;
    color: white;
    text-decoration: none;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-size: 0.7rem;
  }

  .btn:hover {
    background: white;
    color: black;
  }
</style>
</head>

<body>

<img src="curiousend.jpeg" class="bg">

<h1>Curious Ending</h1>

<div class="story">
  <p class="line delay1">You decide not to ignore the feeling that something is off.</p>
  <p class="line delay2">Every hallway, every screen, every whisper feels like a clue.</p>
  <p class="line delay3">You don’t know what you’ll find next.</p>
  <p class="line delay4">But you’re ready to keep looking.</p>
</div>

<div class="end">
  The Mystery Continues<br>
  <a href="intro.html" class="btn">Restart</a>
   <a href="index.html" class="btn"> Home Page</a>
</div>

</body>
</html>
